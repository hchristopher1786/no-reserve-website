<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Galleries — No Reserve Photography</title>
  <meta name="description" content="Your photos are ready. Enter your gallery access code to view your shoot." />
  <link rel="icon" href="/Logo_Circular_PNG.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>

  <!-- ===== Shared header (duplicated across pages — no build system) ===== -->
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-header__logo" href="/" aria-label="No Reserve Photography home">
        <img src="/Logo_Rectangular_Transp_Back.png" alt="No Reserve Photography" />
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="site-nav">
        <a href="/">Home</a>
        <a href="/wallpapers/">Wallpapers</a>
        <a href="/client-galleries/" class="is-active">Client Galleries</a>
      </nav>
    </div>
  </header>

  <main>

    <!-- ===== Compact hero ===== -->
    <section class="hero hero--compact">
      <div class="hero__content">
        <h1>Client Galleries</h1>
        <p class="hero__subhead">Your photos are ready.</p>
      </div>
    </section>

    <!-- ===== Access form ===== -->
    <section class="section" id="access-section">
      <div class="container">
        <div class="access-card">
          <h2>Enter your gallery code</h2>
          <form class="access-card__form" id="gallery-form">
            <input type="text" id="gallery-code" placeholder="Gallery access code"
                   autocomplete="off" autocapitalize="off" spellcheck="false" required />
            <button type="submit" class="btn btn--primary">View My Gallery</button>
            <p class="form-error" id="gallery-error" role="alert"></p>
          </form>
        </div>
      </div>
    </section>

    <!-- ===== Results (hidden until a valid code is entered) ===== -->
    <section class="section is-hidden" id="results-section">
      <div class="container">
        <h2 class="section__heading" id="gallery-client-name"><!-- clientName injected here --></h2>
        <div class="gallery-toolbar is-hidden" id="gallery-toolbar">
          <span class="gallery-toolbar__count" id="gallery-count"></span>
          <button type="button" class="btn btn--primary" id="download-all">Download all (full-res)</button>
        </div>
        <div class="gallery-grid" id="gallery-grid"></div>
      </div>
    </section>

  </main>

  <!-- ===== Shared footer ===== -->
  <footer class="site-footer">
    <div class="container">
      <img class="site-footer__logo" src="/Logo_Circular_PNG.png" alt="No Reserve Photography" />
      <p>&copy; 2026 No Reserve Photography</p>
      <div class="site-footer__links">
        <a href="#" aria-label="Instagram (link coming soon)">Instagram</a>
        <a href="#" aria-label="Bring a Trailer profile (link coming soon)">Bring a Trailer</a>
      </div>
    </div>
  </footer>

  <script src="/assets/js/main.js"></script>

  <!-- ===== Gallery lookup (all client-side, no page reload) ===== -->
  <script>
    (function () {
      var form = document.getElementById('gallery-form');
      var input = document.getElementById('gallery-code');
      var errorEl = document.getElementById('gallery-error');
      var accessSection = document.getElementById('access-section');
      var resultsSection = document.getElementById('results-section');
      var nameEl = document.getElementById('gallery-client-name');
      var grid = document.getElementById('gallery-grid');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errorEl.textContent = '';

        var token = input.value.trim();
        if (!token) return;

        var res;
        try {
          res = await fetch('/api/gallery/' + encodeURIComponent(token));
        } catch (err) {
          errorEl.textContent = 'Network error. Please try again.';
          return;
        }

        // 404 -> bad/unknown code
        if (res.status === 404) {
          errorEl.textContent = 'Gallery not found. Check your code and try again.';
          return;
        }
        if (!res.ok) {
          errorEl.textContent = 'Something went wrong. Please try again.';
          return;
        }

        // 200 -> { clientName, photoKeys: string[], downloadKeys?: string[] }
        var gallery = await res.json();
        renderGallery(token, gallery);
      });

      var toolbar = document.getElementById('gallery-toolbar');
      var countEl = document.getElementById('gallery-count');
      var downloadAllBtn = document.getElementById('download-all');

      function downloadHref(token, key) {
        return '/api/gallery-download/' + encodeURIComponent(token) + '/' + encodeURIComponent(key);
      }

      function renderGallery(token, gallery) {
        nameEl.textContent = gallery.clientName || 'Your Gallery';

        var photoKeys = gallery.photoKeys || [];
        var downloadKeys = gallery.downloadKeys || [];

        grid.innerHTML = '';
        photoKeys.forEach(function (key, i) {
          var fig = document.createElement('figure');
          fig.className = 'gallery-item';

          // Token-gated preview: the Worker verifies this key belongs to
          // this gallery before streaming the (downscaled) image.
          var img = document.createElement('img');
          img.src = '/api/photo/' + encodeURIComponent(token) + '/' + encodeURIComponent(key);
          img.alt = (gallery.clientName ? gallery.clientName + ' — ' : '') + key;
          img.loading = 'lazy';
          fig.appendChild(img);

          // Per-photo full-res download (separate originals, served as a
          // file attachment). Only if a matching downloadKey exists.
          var dlKey = downloadKeys[i];
          if (dlKey) {
            var a = document.createElement('a');
            a.className = 'gallery-item__dl';
            a.href = downloadHref(token, dlKey);
            a.setAttribute('download', '');
            a.textContent = '↓ Full-res';
            fig.appendChild(a);
          }

          grid.appendChild(fig);
        });

        // Download-all toolbar — only when full-res keys are available.
        if (downloadKeys.length) {
          countEl.textContent = photoKeys.length + ' photos';
          toolbar.classList.remove('is-hidden');
          downloadAllBtn.onclick = function () { downloadAll(token, downloadKeys); };
        } else {
          toolbar.classList.add('is-hidden');
        }

        // Swap the form out for the results.
        accessSection.classList.add('is-hidden');
        resultsSection.classList.remove('is-hidden');
      }

      // Trigger each full-res download in turn. Browsers may ask to allow
      // multiple downloads; the short delay keeps them from being dropped.
      async function downloadAll(token, downloadKeys) {
        var orig = downloadAllBtn.textContent;
        downloadAllBtn.disabled = true;
        for (var i = 0; i < downloadKeys.length; i++) {
          downloadAllBtn.textContent = 'Downloading ' + (i + 1) + ' / ' + downloadKeys.length + '…';
          var a = document.createElement('a');
          a.href = downloadHref(token, downloadKeys[i]);
          a.setAttribute('download', '');
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          await new Promise(function (r) { setTimeout(r, 700); });
        }
        downloadAllBtn.textContent = orig;
        downloadAllBtn.disabled = false;
      }
    })();
  </script>

</body>
</html>
