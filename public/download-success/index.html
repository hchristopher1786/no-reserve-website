<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — No Reserve Photography</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/Logo_Circular_PNG.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>

  <!-- ===== Shared header (duplicated across pages — no build system) ===== -->
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-header__logo" href="/" aria-label="No Reserve Photography home">
        <img src="/Logo_Rectangular_Transp_Back.png" alt="No Reserve Photography" />
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="site-nav">
        <a href="/">Home</a>
        <a href="/pricing/">Pricing</a>
        <a href="/wallpapers/">Wallpapers</a>
        <a href="/client-galleries/">Client Galleries</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- Stripe redirects here on success: /download-success?session_id=...
         The download button hits /api/download?session_id=..., which
         verifies the session was paid before streaming the file from R2. -->
    <section class="message-page">
      <div class="container">
        <h1>Thank You</h1>
        <p>Thank you for your purchase! Your download is ready below.</p>
        <p id="download-slot">
          <!-- A "Download" button is injected here when a session_id is present. -->
        </p>
        <p><a class="btn btn--ghost" href="/wallpapers/">Back to Wallpapers</a></p>
      </div>
    </section>
  </main>

  <script src="/assets/js/main.js"></script>

  <script>
    (function () {
      var sessionId = new URLSearchParams(window.location.search).get('session_id');
      var slot = document.getElementById('download-slot');
      if (sessionId) {
        var a = document.createElement('a');
        a.className = 'btn btn--primary';
        a.href = '/api/download?session_id=' + encodeURIComponent(sessionId);
        a.textContent = 'Download Wallpaper';
        slot.appendChild(a);
      } else {
        // No session id (e.g. someone hit the page directly).
        slot.textContent = 'If you just purchased, return via your Stripe receipt link to download.';
      }
    })();
  </script>
</body>
</html>
