<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Gallery — No Reserve Photography</title>
</head>
<body>
  <!-- PLACEHOLDER — reads ?token=xxxx from the URL, asks
       /api/gallery/:token for that client's photo list, then
       renders thumbnails + full-res delivery via R2. -->
  <h1>Your Gallery</h1>
  <div id="gallery-grid">Loading…</div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    async function loadGallery() {
      if (!token) {
        document.getElementById('gallery-grid').textContent =
          'No gallery token provided.';
        return;
      }
      const res = await fetch(`/api/gallery/${token}`);
      if (!res.ok) {
        document.getElementById('gallery-grid').textContent =
          'Gallery not found or link expired.';
        return;
      }
      const gallery = await res.json();
      // TODO: render gallery.photoKeys as an actual grid of images
      document.getElementById('gallery-grid').textContent =
        JSON.stringify(gallery);
    }

    loadGallery();
  </script>
</body>
</html>
