<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@500;600&display=swap" rel="stylesheet" />
  <title>Auction Portfolio | No Reserve Photography</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <style>
    .portfolio-header {
      padding: 7rem 2rem 3rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .portfolio-header .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .portfolio-header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      margin: 0 0 1rem;
    }
    .portfolio-header p {
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text-secondary);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.65;
    }
    .portfolio-grid-section {
      max-width: 1400px;
      margin: 0 auto;
      padding: 3.5rem 2rem 5rem;
    }
    .portfolio-count {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5px;
      background: var(--border);
    }
    .listing-tile {
      display: block;
      position: relative;
      overflow: hidden;
      background: var(--surface);
      aspect-ratio: 4 / 3;
      text-decoration: none;
    }
    .listing-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.45s ease;
      filter: brightness(0.92);
    }
    .listing-tile:hover img {
      transform: scale(1.04);
      filter: brightness(1);
    }
    .listing-tile::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.18) 45%, transparent 70%);
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .listing-tile:hover::after { opacity: 0.7; }
    .tile-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.25rem 1.1rem 1rem;
      z-index: 1;
    }
    .tile-year {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      display: block;
      margin-bottom: 0.2rem;
    }
    .tile-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1.15rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #ffffff;
      line-height: 1.15;
      display: block;
    }
    .tile-bat-badge {
      position: absolute;
      top: 0.85rem;
      right: 0.85rem;
      z-index: 2;
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 0.3rem 0.55rem;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .listing-tile:hover .tile-bat-badge { opacity: 1; transform: translateY(0); }
    .skeleton {
      background: var(--surface);
      aspect-ratio: 4 / 3;
      position: relative;
      overflow: hidden;
    }
    .skeleton::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
      animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .portfolio-message {
      text-align: center;
      padding: 4rem 2rem;
      font-family: 'Inter', sans-serif;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    @media (max-width: 600px) {
      .portfolio-header { padding: 6rem 1.25rem 2.5rem; }
      .portfolio-grid-section { padding: 2.5rem 0 4rem; }
      .portfolio-count { padding: 0 1.25rem; }
      .portfolio-grid { grid-template-columns: repeat(2, 1fr); gap: 1px; }
      .tile-name { font-size: 0.95rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      .listing-tile img, .tile-bat-badge, .listing-tile::after { transition: none; }
      .skeleton::before { animation: none; }
    }
  </style>
</head>
<body>
  <!-- ===== Shared header (duplicated across pages — no build system) ===== -->
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-header__logo" href="/" aria-label="No Reserve Photography home">
        <img src="/Logo_Rectangular_Transp_Back.png" alt="No Reserve Photography" />
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="site-nav">
        <a href="/">Home</a>
        <a href="/pricing/">Pricing</a>
        <a href="/wallpapers/">Wallpapers</a>
        <a href="/bat-portfolio/" class="is-active">Portfolio</a>
        <a href="/client-galleries/">Client Galleries</a>
      </nav>
    </div>
  </header>

  <header class="portfolio-header">
    <p class="eyebrow">Published Work</p>
    <h1>Auction Listings</h1>
    <p>Every car below sold at auction with photography by No Reserve. Tap any photo to view the original listing.</p>
  </header>

  <section class="portfolio-grid-section">
    <p class="portfolio-count" id="portfolioCount">&nbsp;</p>
    <div class="portfolio-grid" id="portfolioGrid">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </section>

  <script src="/assets/js/main.js"></script>
  <script>
    (async function () {
      const grid = document.getElementById('portfolioGrid');
      const countEl = document.getElementById('portfolioCount');

      function escHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function platformFromUrl(url) {
        try {
          const host = new URL(url).hostname.replace('www.', '');
          if (host.includes('bringatrailer.com')) return 'Bring a Trailer';
          if (host.includes('carsandbids.com'))   return 'Cars & Bids';
          if (host.includes('pcarmarket.com'))     return 'PCarMarket';
          if (host.includes('mecum.com'))          return 'Mecum';
          if (host.includes('ebay.com'))           return 'eBay Motors';
          if (host.includes('broadarrowauctions.com')) return 'Broad Arrow';
          return 'View Listing';
        } catch {
          return 'View Listing';
        }
      }

      let listings;
      try {
        const res = await fetch('/bat-portfolio/listings.json');
        if (!res.ok) throw new Error();
        listings = await res.json();
      } catch {
        grid.innerHTML = '<p class="portfolio-message">Listings unavailable — please check back soon.</p>';
        return;
      }

      if (!listings.length) {
        grid.innerHTML = '<p class="portfolio-message">No listings yet.</p>';
        return;
      }

      listings.sort((a, b) => b.year - a.year);
      countEl.textContent = `${listings.length} listing${listings.length !== 1 ? 's' : ''}`;

      grid.innerHTML = listings.map(car => {
        const label = `${car.make} ${car.model}`;
        const imgSrc = car.thumb;
        const platform = platformFromUrl(car.listingUrl);
        return `
          <a class="listing-tile"
             href="${escHtml(car.listingUrl)}"
             target="_blank"
             rel="noopener noreferrer"
             aria-label="${escHtml(car.year + ' ' + label)} — View on ${escHtml(platform)}">
            <img src="${escHtml(imgSrc)}" alt="${escHtml(car.year + ' ' + label)}" loading="lazy" decoding="async" />
            <span class="tile-bat-badge">View on ${escHtml(platform)} ↗</span>
            <div class="tile-caption">
              <span class="tile-year">${escHtml(String(car.year))}</span>
              <span class="tile-name">${escHtml(label)}</span>
            </div>
          </a>`;
      }).join('');
    })();
  </script>
</body>
</html>
