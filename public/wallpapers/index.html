<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallpapers — No Reserve Photography</title>
</head>
<body>
  <!-- PLACEHOLDER — each photo card here should call buyPhoto() to
       kick off a Stripe Checkout session via /api/checkout. -->
  <h1>Wallpapers</h1>
  <div id="wallpaper-grid">
    <!-- Photo cards render here once the bucket's file list (or a
         small JSON manifest you maintain) is wired up. -->
  </div>

  <script>
    async function buyPhoto(photoId, photoName, priceCents) {
      const res = await fetch('/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ photoId, photoName, priceCents })
      });
      const data = await res.json();
      if (data.url) {
        window.location.href = data.url; // off to Stripe Checkout
      } else {
        console.error('Checkout failed', data);
      }
    }
  </script>
</body>
</html>
