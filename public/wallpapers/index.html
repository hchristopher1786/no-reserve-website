<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallpapers — No Reserve Photography</title>
  <meta name="description" content="Full-resolution desktop wallpapers — free to download." />
  <link rel="icon" href="/Logo_Circular_PNG.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>

  <!-- ===== Shared header (duplicated across pages — no build system) ===== -->
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-header__logo" href="/" aria-label="No Reserve Photography home">
        <img src="/Logo_Rectangular_Transp_Back.png" alt="No Reserve Photography" />
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="site-nav">
        <a href="/">Home</a>
        <a href="/wallpapers/" class="is-active">Wallpapers</a>
        <a href="/bat-portfolio/">Portfolio</a>
        <a href="/client-galleries/">Client Galleries</a>
      </nav>
    </div>
  </header>

  <main>

    <!-- ===== Compact hero ===== -->
    <section class="hero hero--compact">
      <div class="hero__content">
        <h1>Wallpapers</h1>
        <p class="hero__subhead">Full-resolution desktop wallpapers — free to download.</p>
      </div>
    </section>

    <!-- ===== Storefront grid (rendered from the catalog by JS below) ===== -->
    <section class="section">
      <div class="container">
        <div class="wallpaper-grid" id="wallpaper-grid"></div>
      </div>
    </section>

  </main>

  <!-- ===== Shared footer ===== -->
  <footer class="site-footer">
    <div class="container">
      <img class="site-footer__logo" src="/Logo_Circular_PNG.png" alt="No Reserve Photography" />
      <p>&copy; 2026 No Reserve Photography</p>
      <div class="site-footer__links">
        <a href="#" aria-label="Instagram (link coming soon)">Instagram</a>
        <a href="#" aria-label="Bring a Trailer profile (link coming soon)">Bring a Trailer</a>
      </div>
    </div>
  </footer>

  <script src="/assets/js/main.js"></script>

  <!-- ===== Catalog + storefront rendering =====
       This list mirrors the entries in src/catalog.js. No bundler here, so
       it's inlined as plain data. If you change names/prices, update both
       this array AND src/catalog.js (the Worker trusts catalog.js for the
       actual charge — this array is display-only). -->
  <script>
    const WALLPAPERS = [
      { id: "wallpaper-01", name: "Wallpaper 01" },
      { id: "wallpaper-02", name: "Wallpaper 02" },
      { id: "wallpaper-03", name: "Wallpaper 03" },
      { id: "wallpaper-04", name: "Wallpaper 04" },
      { id: "wallpaper-05", name: "Wallpaper 05" },
      { id: "wallpaper-06", name: "Wallpaper 06" },
      { id: "wallpaper-07", name: "Wallpaper 07" },
      { id: "wallpaper-08", name: "Wallpaper 08" },
      { id: "wallpaper-09", name: "Wallpaper 09" },
      { id: "wallpaper-10", name: "Wallpaper 10" },
      { id: "wallpaper-11", name: "Wallpaper 11" },
      { id: "wallpaper-12", name: "Wallpaper 12" },
      { id: "wallpaper-13", name: "Wallpaper 13" },
      { id: "wallpaper-14", name: "Wallpaper 14" },
      { id: "wallpaper-15", name: "Wallpaper 15" },
      { id: "wallpaper-16", name: "Wallpaper 16" },
      { id: "wallpaper-17", name: "Wallpaper 17" },
      { id: "wallpaper-18", name: "Wallpaper 18" },
      { id: "wallpaper-19", name: "Wallpaper 19" },
      { id: "wallpaper-20", name: "Wallpaper 20" },
      { id: "wallpaper-21", name: "Wallpaper 21" },
      { id: "wallpaper-23", name: "Wallpaper 23" },
      { id: "wallpaper-24", name: "Wallpaper 24" },
      { id: "wallpaper-25", name: "Wallpaper 25" },
      { id: "wallpaper-26", name: "Wallpaper 26" },
      { id: "wallpaper-27", name: "Wallpaper 27" },
      { id: "wallpaper-28", name: "Wallpaper 28" },
      { id: "wallpaper-29", name: "Wallpaper 29" },
      { id: "wallpaper-30", name: "Wallpaper 30" },
      { id: "wallpaper-31", name: "Wallpaper 31" },
      { id: "wallpaper-32", name: "Wallpaper 32" },
      { id: "wallpaper-33", name: "Wallpaper 33" },
      { id: "wallpaper-34", name: "Wallpaper 34" },
      { id: "wallpaper-36", name: "Wallpaper 36" },
      { id: "wallpaper-37", name: "Wallpaper 37" },
      { id: "wallpaper-38", name: "Wallpaper 38" },
      { id: "wallpaper-39", name: "Wallpaper 39" },
      { id: "wallpaper-40", name: "Wallpaper 40" },
      { id: "wallpaper-41", name: "Wallpaper 41" },
      { id: "wallpaper-42", name: "Wallpaper 42" },
      { id: "wallpaper-43", name: "Wallpaper 43" },
      { id: "wallpaper-44", name: "Wallpaper 44" },
      { id: "wallpaper-45", name: "Wallpaper 45" },
      { id: "wallpaper-46", name: "Wallpaper 46" },
      { id: "wallpaper-47", name: "Wallpaper 47" },
      { id: "wallpaper-48", name: "Wallpaper 48" },
      { id: "wallpaper-49", name: "Wallpaper 49" },
      { id: "wallpaper-50", name: "Wallpaper 50" },
      { id: "wallpaper-51", name: "Wallpaper 51" },
    ];

    // Render one card per wallpaper. The media area shows a downscaled
    // public preview from /assets/wallpapers/; the Download button links to
    // /api/wallpaper/{id}, which streams the full-resolution original from
    // R2 for free.
    (function renderWallpapers() {
      const grid = document.getElementById('wallpaper-grid');
      if (!grid) return;

      WALLPAPERS.forEach(function (w) {
        const card = document.createElement('article');
        card.className = 'wallpaper-card';

        const media = document.createElement('div');
        media.className = 'wallpaper-card__media';
        const thumb = document.createElement('img');
        thumb.src = '/assets/wallpapers/' + w.id + '.jpg';
        thumb.alt = w.name;
        thumb.loading = 'lazy';
        media.appendChild(thumb);

        const body = document.createElement('div');
        body.className = 'wallpaper-card__body';

        const title = document.createElement('span');
        title.className = 'wallpaper-card__title';
        title.textContent = w.name;

        const price = document.createElement('span');
        price.className = 'wallpaper-card__price';
        price.textContent = 'Free';

        const btn = document.createElement('a');
        btn.className = 'btn btn--primary';
        btn.textContent = 'Download';
        btn.href = '/api/wallpaper/' + w.id;
        btn.setAttribute('download', '');

        body.appendChild(title);
        body.appendChild(price);
        body.appendChild(btn);
        card.appendChild(media);
        card.appendChild(body);
        grid.appendChild(card);
      });
    })();
  </script>

  <!-- Wallpapers are free: each card links straight to /api/wallpaper/{id}.
       The Stripe checkout flow (/api/checkout, /api/webhook, /api/download)
       is left in place in the Worker for future paid gallery sales. -->

</body>
</html>
